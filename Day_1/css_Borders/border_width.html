<!DOCTYPE html>
<html>
<head>
<style>
p.one {
  border-style: solid;
  border-width: 5px;
  border-color: red;
}
p.two {
  border-style: solid;
  /* border-width: top$Bottom Left$Right; */
  border-width: 5px 20px;
}
p.three {
  border-style: solid;
  /* border-width: top right bottom left */
  border-width: 5px 10px 15px 20px;
}
</style>
</head>
<body>
<p class="one">all borders same</p>
<p class="two">top$bottom border same  left$Right border same.</p>
<p class="three">top right bottom left</p>
<p><b>Note:</b> The "border-width" property does not work if it is used alone. 
Always specify the "border-style" property to set the borders first.</p>
</body>
</html>
